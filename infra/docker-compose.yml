services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tunnelkit
      POSTGRES_PASSWORD: tunnelkit
      POSTGRES_DB: tunnelkit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tunnelkit"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://tunnelkit:tunnelkit@postgres:5432/tunnelkit?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      JWT_SECRET: "dev-secret-change-in-production"
      API_SECRET: "dev-secret-change-in-production"
      BASE_DOMAIN: "localhost:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "sleep 3 && ./scripts/migrate.sh && ./bin/server"

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: "http://localhost:8080"
    depends_on:
      - server

volumes:
  postgres_data:
  redis_data:
